<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Next Topper – Batches</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config = { darkMode: 'class' };</script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <link rel="icon" type="image/png" href="images/NTlogo.png">
  <style>
    * { box-sizing: border-box; }
    body { font-family: 'Inter', system-ui, -apple-system, sans-serif; background: #0b0f1a; color: #fff; }
    html.light body { background: #f0f2f5; color: #111; }

    .glass-card {
      background: rgba(255,255,255,0.03);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255,255,255,0.06);
      box-shadow: 0 20px 40px -12px rgba(0,0,0,0.5);
      transition: all 0.3s ease;
    }
    html.light .glass-card {
      background: rgba(255,255,255,0.7);
      border: 1px solid rgba(0,0,0,0.08);
      box-shadow: 0 8px 32px rgba(0,0,0,0.06);
    }
    .glass-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 30px 60px -12px rgba(99,102,241,0.3);
    }

    #splash {
      position: fixed; inset: 0; background: #0b0f1a; display: flex;
      flex-direction: column; align-items: center; justify-content: center;
      z-index: 999; transition: opacity 0.5s ease;
    }
    #splash.hide { opacity: 0; pointer-events: none; }
    #splash img { width: 120px; height: 120px; object-fit: contain; margin-bottom: 24px; animation: pulse 2s infinite; }
    @keyframes pulse { 0%,100% { transform: scale(1); } 50% { transform: scale(1.05); } }

    #telegram-popup {
      position: fixed; inset: 0; background: rgba(0,0,0,0.8); display: none;
      align-items: center; justify-content: center; z-index: 1000; backdrop-filter: blur(8px);
    }
    #telegram-popup.show { display: flex; }
    .popup-card {
      background: rgba(30,41,59,0.95); border-radius: 24px; padding: 32px; text-align: center;
      max-width: 400px; width: 90%; border: 1px solid rgba(255,255,255,0.1);
      backdrop-filter: blur(20px);
    }
    .popup-card h2 { color: white; font-size: 24px; margin-bottom: 12px; }
    .popup-card p { color: #9ca3af; margin-bottom: 24px; line-height: 1.6; }
    .popup-card a {
      display: inline-block; background: #25D366; color: black; padding: 14px 32px;
      border-radius: 16px; font-weight: 700; text-decoration: none; transition: 0.2s;
    }
    .popup-card a:hover { background: #1ebd5a; }
    .popup-card .close-btn {
      position: absolute; top: 16px; right: 16px; background: none; border: none;
      color: white; font-size: 28px; cursor: pointer; opacity: 0.7;
    }

    .fav-btn svg { width: 24px; height: 24px; transition: 0.2s; }
    .fav-btn.active svg { fill: #ef4444; stroke: #ef4444; }

    .tab { transition: all 0.3s; }
    .tab.active { background: linear-gradient(135deg, #6366f1, #a855f7); color: #fff; box-shadow: 0 8px 24px rgba(99,102,241,0.4); }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .animate-in { animation: fadeInUp 0.5s ease forwards; }
  </style>
</head>
<body class="min-h-screen transition-colors antialiased">

  <!-- SPLASH SCREEN -->
  <div id="splash">
    <img src="images/NTlogo.png" alt="Next Topper" />
    <p class="text-zinc-400 text-sm tracking-wide">Initializing System...</p>
  </div>

  <!-- TELEGRAM POPUP -->
  <div id="telegram-popup">
    <div class="popup-card relative">
      <button class="close-btn" onclick="document.getElementById('telegram-popup').classList.remove('show')">&times;</button>
      <h2>Join Our Telegram</h2>
      <p>Get latest updates, lectures and premium content instantly.</p>
      <a href="https://t.me/StudyOne" target="_blank">Join Telegram Channel</a>
    </div>
  </div>

  <!-- MAIN APP -->
  <div id="app" class="hidden max-w-7xl mx-auto px-4 py-8 animate-in">
    <!-- Header -->
    <header class="flex items-center justify-between mb-12">
      <div class="flex items-center gap-4">
        <img src="images/NTlogo.png" alt="Logo" class="w-12 h-12 rounded-2xl object-contain bg-white/10 p-1" />
        <h1 class="text-2xl font-black tracking-tight">NEXT TOPPER</h1>
      </div>
      <button id="theme-toggle" class="p-3 rounded-full hover:bg-white/10 transition glass-card">
        <span id="theme-icon" class="text-xl">🌙</span>
      </button>
    </header>

    <!-- TABS -->
    <div class="flex gap-3 mb-10">
      <button id="tab-all" class="tab active px-6 py-3 rounded-full text-sm font-semibold transition glass-card" onclick="switchTab('all')">Batches</button>
      <button id="tab-fav" class="tab px-6 py-3 rounded-full text-sm font-semibold transition glass-card" onclick="switchTab('fav')">Favorite Batches</button>
    </div>

    <!-- SEARCH -->
    <div id="search-container" class="relative max-w-md mb-10">
      <input type="text" id="search" placeholder="Search batches..." class="w-full bg-white/5 backdrop-blur-xl border border-white/10 rounded-2xl py-3.5 px-5 pl-12 text-white placeholder-zinc-500 focus:outline-none focus:border-indigo-500 transition glass-card" />
      <svg class="absolute left-4 top-3.5 text-zinc-500 w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-4.35-4.35M11 19a8 8 0 100-16 8 8 0 000 16z"/></svg>
    </div>

    <!-- BATCH GRID -->
    <div id="batch-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6"></div>
  </div>

  <script>
    // ========== ENVIRONMENT CONFIG ==========
    const CONFIG = {
      BATCH_LIST_URL: 'https://raw.githubusercontent.com/guptaanish7026/Apps/refs/heads/main/rrbatches.json',
      API_BASE: 'https://study-one-api.vercel.app/api',
      MEDIA_PROXY: 'https://study-one-access.vercel.app/media',
      TELEGRAM_BOT: 'https://t.me/StudyOne_Key_Generator_Bot',
      CORS_PROXY: 'https://corsproxy.io/?',
      TELEGRAM_CHANNEL: 'https://t.me/StudyOne'
    };

    // ========== DEV TOOLS PROTECTION ==========
    (function() {
      document.addEventListener('contextmenu', e => e.preventDefault());
      document.addEventListener('keydown', function(e) {
        if (e.keyCode === 123) { e.preventDefault(); return false; }
        if (e.ctrlKey && e.shiftKey && (e.keyCode === 73 || e.keyCode === 74 || e.keyCode === 67)) { e.preventDefault(); return false; }
        if (e.ctrlKey && e.keyCode === 85) { e.preventDefault(); return false; }
      });
    })();

    // ========== THEME ==========
    const themeToggle = document.getElementById('theme-toggle');
    const themeIcon = document.getElementById('theme-icon');
    function applyTheme(theme) {
      document.documentElement.classList.toggle('dark', theme === 'dark');
      document.documentElement.classList.toggle('light', theme === 'light');
      themeIcon.textContent = theme === 'dark' ? '🌙' : '☀️';
      localStorage.setItem('theme', theme);
    }
    applyTheme(localStorage.getItem('theme') || 'dark');
    themeToggle.addEventListener('click', () => {
      applyTheme(document.documentElement.classList.contains('dark') ? 'light' : 'dark');
    });

    // ========== FAVORITES ==========
    function getFavs() { return JSON.parse(localStorage.getItem('nt_favs') || '[]'); }
    function saveFavs(favs) { localStorage.setItem('nt_favs', JSON.stringify(favs)); }

    // ========== STATE ==========
    let allBatches = [];
    let currentTab = 'all';
    const grid = document.getElementById('batch-grid');
    const searchInput = document.getElementById('search');
    const tabAll = document.getElementById('tab-all');
    const tabFav = document.getElementById('tab-fav');
    const searchContainer = document.getElementById('search-container');

    function switchTab(tab) {
      currentTab = tab;
      tabAll.classList.toggle('active', tab === 'all');
      tabFav.classList.toggle('active', tab === 'fav');
      searchContainer.style.display = tab === 'all' ? 'block' : 'none';
      renderGrid();
    }

    function renderGrid() {
      const favs = getFavs();
      let batches = currentTab === 'all' ? allBatches : allBatches.filter(b => favs.includes(String(b.id)));
      const term = searchInput.value.toLowerCase();
      if (currentTab === 'all') batches = batches.filter(b => b.title.toLowerCase().includes(term));
      if (!batches.length) {
        grid.innerHTML = `<div class="col-span-full text-center py-16"><p class="text-zinc-500 text-lg">${currentTab === 'all' ? 'No batches found.' : 'No favorite batches yet.'}</p></div>`;
        return;
      }
      grid.innerHTML = batches.map(b => {
        const isFav = favs.includes(String(b.id));
        return `
          <div class="glass-card rounded-2xl overflow-hidden group animate-in">
            <div class="aspect-video overflow-hidden relative">
              <img src="${b.thumbnail}" alt="${b.title}" class="w-full h-full object-cover group-hover:scale-110 transition-transform duration-700" loading="lazy" />
              <div class="absolute inset-0 bg-gradient-to-t from-black/80 via-transparent to-transparent opacity-0 group-hover:opacity-100 transition-opacity"></div>
            </div>
            <div class="p-5">
              <h3 class="font-bold text-lg text-white line-clamp-2 mb-2 leading-snug">${b.title}</h3>
              <div class="flex items-center justify-between mb-3">
                <span class="text-2xl font-black bg-gradient-to-r from-indigo-400 to-purple-400 bg-clip-text text-transparent">₹${b.mrp}</span>
                <button class="fav-btn ${isFav ? 'active' : ''} text-zinc-500 hover:text-rose-500 transition" onclick="toggleFav(event, '${b.id}')">
                  <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="${isFav ? '#ef4444' : 'none'}" stroke="${isFav ? '#ef4444' : 'currentColor'}" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>
                </button>
              </div>
              <div class="flex items-center gap-2 text-xs text-zinc-400 mb-4">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
                <span>${b.start_date || 'N/A'} – ${b.end_date || 'N/A'}</span>
              </div>
              <a href="batches.html?batch_id=${b.id}&token=${encodeURIComponent(b.token)}" class="block w-full text-center bg-gradient-to-r from-indigo-500 to-purple-600 hover:from-indigo-600 hover:to-purple-700 text-white font-semibold py-3 rounded-xl transition-all shadow-lg shadow-indigo-500/25 hover:shadow-indigo-500/40">Start Learning</a>
            </div>
          </div>
        `;
      }).join('');
    }

    window.toggleFav = function(e, batchId) {
      e.stopPropagation();
      e.preventDefault();
      let favs = getFavs();
      const id = String(batchId);
      if (favs.includes(id)) favs = favs.filter(f => f !== id);
      else favs.push(id);
      saveFavs(favs);
      renderGrid();
    };

    searchInput.addEventListener('input', renderGrid);

    // ========== INIT ==========
    async function init() {
      try {
        const res = await fetch(CONFIG.BATCH_LIST_URL);
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const json = await res.json();
        if (json.success && Array.isArray(json.data)) {
          allBatches = json.data;
        } else {
          throw new Error('Invalid batch list format');
        }
      } catch (e) {
        console.error('Batch load error:', e);
      } finally {
        const splash = document.getElementById('splash');
        splash.classList.add('hide');
        setTimeout(() => splash.style.display = 'none', 500);
        document.getElementById('app').classList.remove('hidden');
        tabAll.classList.add('active');
        renderGrid();
        setTimeout(() => {
          if (!localStorage.getItem('telegram_popup_shown')) {
            document.getElementById('telegram-popup').classList.add('show');
            localStorage.setItem('telegram_popup_shown', '1');
          }
        }, 3000);
      }
    }

    init();
  </script>
</body>
</html>
