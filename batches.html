<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Batch Details – Next Topper</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config = { darkMode: 'class' };</script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/zstddec@0.1.0/dist/zstddec.min.js"></script>

  <style>
    * { box-sizing: border-box; }
    body { font-family: 'Inter', system-ui, -apple-system, sans-serif; background: #0b0f1a; color: #fff; }
    html.light body { background: #f0f2f5; color: #111; }

    .glass-card {
      background: rgba(255,255,255,0.03);
      backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255,255,255,0.06);
      box-shadow: 0 20px 40px -12px rgba(0,0,0,0.5); transition: all 0.3s ease;
    }
    html.light .glass-card { background: rgba(255,255,255,0.7); border-color: rgba(0,0,0,0.08); box-shadow: 0 8px 32px rgba(0,0,0,0.06); }

    .tab-btn { transition: all 0.3s; }
    .tab-btn.active { background: linear-gradient(135deg, #6366f1, #a855f7); color: #fff; box-shadow: 0 8px 24px rgba(99,102,241,0.4); }

    .folder-content { display: none; margin-top: 12px; padding-left: 16px; border-left: 2px solid #6366f1; }
    .folder-content.open { display: block; animation: slideDown 0.3s ease; }
    @keyframes slideDown { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }

    .file-card {
      background: rgba(255,255,255,0.04); border-radius: 14px; padding: 14px; margin-bottom: 10px;
      display: flex; gap: 14px; cursor: pointer; transition: all 0.2s ease;
      overflow: hidden; word-break: break-word; align-items: center; border: 1px solid rgba(255,255,255,0.05);
    }
    html.light .file-card { background: rgba(0,0,0,0.02); border-color: rgba(0,0,0,0.06); }
    .file-card:hover { background: rgba(99,102,241,0.1); transform: translateY(-1px); box-shadow: 0 8px 24px rgba(99,102,241,0.15); }

    .file-card .thumb { width: 80px; height: 56px; object-fit: cover; border-radius: 10px; flex-shrink: 0; background: #1e293b; }
    .file-card .info { flex: 1; min-width: 0; display: flex; flex-direction: column; gap: 4px; }
    .file-card .title { font-weight: 600; font-size: 14px; line-height: 1.4; color: #fff; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    html.light .file-card .title { color: #111; }
    .file-card .meta { font-size: 12px; color: #9ca3af; font-weight: 400; }

    @media (max-width: 480px) {
      .file-card { flex-direction: column; align-items: stretch; }
      .file-card .thumb { width: 100%; height: 140px; margin-bottom: 8px; }
    }

    .folder-header {
      display: flex; align-items: center; gap: 12px; padding: 14px; cursor: pointer;
      border-radius: 14px; background: rgba(255,255,255,0.04); transition: 0.2s;
      overflow: hidden; border: 1px solid rgba(255,255,255,0.05);
    }
    html.light .folder-header { background: rgba(0,0,0,0.02); border-color: rgba(0,0,0,0.06); }
    .folder-header:hover { background: rgba(99,102,241,0.1); }
    .folder-icon { width: 36px; height: 36px; object-fit: contain; flex-shrink: 0; }
    .folder-title { font-weight: 600; font-size: 14px; flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .expand-arrow { font-size: 16px; color: #9ca3af; }

    /* Overlays */
    #media-loading-overlay, #media-fallback-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.85);
      display: flex; align-items: center; justify-content: center;
      z-index: 999; backdrop-filter: blur(8px);
    }
    #media-loading-overlay.hidden, #media-fallback-overlay.hidden { display: none; }
    .loading-card, .fallback-card {
      background: rgba(30,41,59,0.95); border-radius: 24px; padding: 32px; text-align: center;
      max-width: 400px; width: 90%; border: 1px solid rgba(255,255,255,0.1); backdrop-filter: blur(20px);
    }
    .loading-card .spinner {
      width: 48px; height: 48px; border: 4px solid rgba(255,255,255,0.2);
      border-top-color: #6366f1; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 16px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-card p, .fallback-card p { margin: 0 0 16px; }
    .loading-card .btn, .fallback-card .btn {
      background: #6366f1; border: none; color: white;
      padding: 10px 24px; border-radius: 12px; cursor: pointer; font-weight: 600; margin: 4px;
    }
    .loading-card .btn-danger, .fallback-card .btn-danger { background: #ef4444; }
    .fallback-card .btn-copy { background: #10b981; }
    .fallback-card .btn-view { background: #6366f1; }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .animate-in { animation: fadeInUp 0.5s ease forwards; }
  </style>
</head>
<body class="min-h-screen transition-colors antialiased">

  <!-- Page loader -->
  <div id="loader" class="fixed inset-0 bg-[#0b0f1a] flex flex-col items-center justify-center z-50 transition-opacity">
    <div class="w-16 h-16 rounded-full border-4 border-zinc-700 border-t-indigo-500 animate-spin mb-4"></div>
    <p class="text-zinc-400 text-sm tracking-wide">Initializing System...</p>
  </div>

  <!-- Media loading overlay -->
  <div id="media-loading-overlay" class="hidden">
    <div class="loading-card">
      <div class="spinner" id="media-spinner"></div>
      <p id="media-status-text" class="text-lg font-semibold text-white">Getting Your Media Ready...</p>
      <div id="media-error-container" class="hidden">
        <p id="media-error-text" class="text-sm text-red-400"></p>
        <button class="btn" id="media-retry-btn">Retry</button>
      </div>
      <button id="media-close-btn" class="btn btn-danger hidden mt-4">Close</button>
    </div>
  </div>

  <!-- Fallback overlay (shown when popup is blocked) -->
  <div id="media-fallback-overlay" class="hidden">
    <div class="fallback-card">
      <p class="text-lg font-semibold text-white">Your Video / PDF is Ready!</p>
      <p class="text-sm text-zinc-400">Click below to View, or Copy the link.</p>
      <div class="flex flex-col gap-3 mt-4">
        <button class="btn btn-view" id="fallback-view-btn">View</button>
        <button class="btn btn-copy" id="fallback-copy-btn">Copy Link</button>
      </div>
      <button id="fallback-close-btn" class="btn btn-danger mt-4">Close</button>
    </div>
  </div>

  <!-- Main app -->
  <div id="app" class="hidden max-w-7xl mx-auto px-4 py-6 animate-in">
    <header class="flex items-center justify-between mb-8 glass-card p-4 rounded-2xl">
      <button onclick="history.back()" class="text-zinc-400 hover:text-white transition font-medium">← Back</button>
      <h1 id="batch-title" class="text-xl font-bold truncate flex-1 text-center">Loading...</h1>
      <button id="theme-toggle-details" class="p-2 rounded-full hover:bg-white/10 transition"><span id="theme-icon-details">🌙</span></button>
    </header>

    <div id="hero" class="glass-card rounded-2xl p-6 mb-8 flex flex-col md:flex-row gap-6 items-center">
      <img id="hero-thumbnail" src="" alt="Batch thumbnail" class="w-40 h-40 rounded-xl object-cover shadow-lg" />
      <div>
        <h2 id="hero-title" class="text-2xl md:text-3xl font-black mb-2 bg-gradient-to-r from-white to-zinc-400 bg-clip-text text-transparent"></h2>
        <p id="hero-price" class="text-2xl font-bold text-indigo-400"></p>
      </div>
    </div>

    <div class="flex gap-2 mb-6">
      <button class="tab-btn active px-6 py-2.5 rounded-full text-sm font-semibold transition glass-card" data-tab="overview">Overview</button>
      <button class="tab-btn px-6 py-2.5 rounded-full text-sm font-semibold transition glass-card" data-tab="study-material">Study Material</button>
    </div>

    <div id="tab-content">
      <div id="overview-panel" class="tab-panel">
        <div id="description-container" class="description glass-card rounded-2xl p-6 prose prose-invert max-w-none"></div>
      </div>
      <div id="study-material-panel" class="tab-panel hidden">
        <div class="flex flex-col lg:flex-row gap-6">
          <aside class="lg:w-72 glass-card rounded-2xl p-5 h-fit lg:sticky top-4">
            <h3 class="text-lg font-semibold mb-4">Subjects</h3>
            <ul id="subject-list" class="space-y-2"></ul>
          </aside>
          <main class="flex-1 glass-card rounded-2xl p-5 min-h-[400px]">
            <nav id="breadcrumb" class="flex flex-wrap gap-2 text-sm text-zinc-400 mb-4"></nav>
            <div id="file-grid" class="space-y-3"></div>
          </main>
        </div>
      </div>
    </div>
  </div>

  <script>
    // ========== CONFIG ==========
    const CONFIG = {
      API_BASE: 'https://study-one-api.vercel.app/api',
      MEDIA_PROXY: 'https://study-one-access.vercel.app/media',
      TELEGRAM_BOT: 'https://t.me/StudyOne_Key_Generator_Bot',
      REFERER: 'https://study-one-api.vercel.app'
    };

    // ========== THEME ==========
    const themeToggle2 = document.getElementById('theme-toggle-details');
    const themeIcon2 = document.getElementById('theme-icon-details');
    function applyTheme(theme) {
      document.documentElement.classList.toggle('dark', theme === 'dark');
      document.documentElement.classList.toggle('light', theme === 'light');
      themeIcon2.textContent = theme === 'dark' ? '🌙' : '☀️';
      localStorage.setItem('theme', theme);
    }
    applyTheme(localStorage.getItem('theme') || 'dark');
    themeToggle2.addEventListener('click', () => {
      applyTheme(document.documentElement.classList.contains('dark') ? 'light' : 'dark');
    });

    // ========== ZSTD DECOMPRESSION ==========
    async function fetchAndDecode(url) {
      const res = await fetch(url, { headers: { 'Referer': CONFIG.REFERER } });
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const buffer = await res.arrayBuffer();
      try {
        const decoder = new ZstdDec();
        const decompressed = decoder.decode(new Uint8Array(buffer));
        const text = new TextDecoder().decode(decompressed);
        const json = JSON.parse(text);
        return json;
      } catch (zstdError) {
        try {
          const text = new TextDecoder().decode(buffer);
          return JSON.parse(text);
        } catch (plainError) {
          throw new Error(`Failed to parse API response: ${zstdError.message}`);
        }
      }
    }

    // ========== MEDIA OVERLAYS ==========
    const loadingOverlay = document.getElementById('media-loading-overlay');
    const fallbackOverlay = document.getElementById('media-fallback-overlay');
    const mediaSpinner = document.getElementById('media-spinner');
    const mediaStatusText = document.getElementById('media-status-text');
    const mediaErrorText = document.getElementById('media-error-text');
    const mediaErrorContainer = document.getElementById('media-error-container');
    const mediaRetryBtn = document.getElementById('media-retry-btn');
    const mediaCloseBtn = document.getElementById('media-close-btn');
    const fallbackViewBtn = document.getElementById('fallback-view-btn');
    const fallbackCopyBtn = document.getElementById('fallback-copy-btn');
    const fallbackCloseBtn = document.getElementById('fallback-close-btn');

    let lastFileUrl = null;
    let pendingRedirectUrl = null;

    function showLoading(message = "Getting Your Media Ready...") {
      mediaSpinner.classList.remove('hidden');
      mediaStatusText.textContent = message;
      mediaStatusText.classList.remove('hidden');
      mediaErrorContainer.classList.add('hidden');
      mediaCloseBtn.classList.add('hidden');
      loadingOverlay.classList.remove('hidden');
      fallbackOverlay.classList.add('hidden');
    }

    function showError(message) {
      mediaSpinner.classList.add('hidden');
      mediaStatusText.classList.add('hidden');
      mediaErrorText.textContent = message;
      mediaErrorContainer.classList.remove('hidden');
      mediaCloseBtn.classList.remove('hidden');
    }

    function hideAllOverlays() {
      loadingOverlay.classList.add('hidden');
      fallbackOverlay.classList.add('hidden');
      lastFileUrl = null;
      pendingRedirectUrl = null;
    }

    function showFallback(redirectUrl) {
      loadingOverlay.classList.add('hidden');
      pendingRedirectUrl = redirectUrl;
      fallbackOverlay.classList.remove('hidden');
    }

    mediaCloseBtn.addEventListener('click', hideAllOverlays);
    fallbackCloseBtn.addEventListener('click', hideAllOverlays);
    mediaRetryBtn.addEventListener('click', () => { if (lastFileUrl) playMedia(lastFileUrl); });

    fallbackViewBtn.addEventListener('click', () => {
      if (pendingRedirectUrl) {
        window.open(pendingRedirectUrl, '_blank');
        hideAllOverlays();
      }
    });

    fallbackCopyBtn.addEventListener('click', async () => {
      if (pendingRedirectUrl) {
        try {
          await navigator.clipboard.writeText(pendingRedirectUrl);
          fallbackCopyBtn.textContent = 'Copied!';
          setTimeout(() => { fallbackCopyBtn.textContent = 'Copy Link'; }, 2000);
        } catch {
          // Fallback: select from a temporary input
          const ta = document.createElement('textarea');
          ta.value = pendingRedirectUrl;
          ta.style.position = 'fixed'; ta.style.left = '-9999px';
          document.body.appendChild(ta);
          ta.select(); document.execCommand('copy');
          document.body.removeChild(ta);
          fallbackCopyBtn.textContent = 'Copied!';
          setTimeout(() => { fallbackCopyBtn.textContent = 'Copy Link'; }, 2000);
        }
      }
    });

    loadingOverlay.addEventListener('click', e => { if (e.target === loadingOverlay) hideAllOverlays(); });
    fallbackOverlay.addEventListener('click', e => { if (e.target === fallbackOverlay) hideAllOverlays(); });

    // ========== MEDIA FLOW ==========
    async function getMediaUrl(mediaToken) {
      const data = await fetchAndDecode(`${CONFIG.API_BASE}/media/${mediaToken}`);

      // Try multiple known field names for the actual media URL
      const fileUrl = data.file_url || data.url || data.video_url || data.stream_url;

      if (fileUrl) return fileUrl;

      // If the API returned the file URL directly as a string at some other key
      // Log the response for debugging
      console.warn('Unexpected media response format:', data);
      throw new Error('Media URL not found in response');
    }

    async function playMedia(fileUrl) {
      showLoading();
      lastFileUrl = fileUrl;
      try {
        const apiUrl = `${CONFIG.MEDIA_PROXY}?url=${encodeURIComponent(fileUrl)}`;
        const res = await fetch(apiUrl, { headers: { 'Referer': CONFIG.REFERER } });
        if (!res.ok) throw new Error(`API error: ${res.status}`);
        const data = await res.json();

        // The media proxy returns { "token": "M1_xxx" }
        const token = data.token;
        if (!token) throw new Error('No token in response');

        const redirectUrl = `${CONFIG.TELEGRAM_BOT}?start=url_token_${token}`;

        // Try to open the redirect; if blocked, show the fallback
        const popup = window.open(redirectUrl, '_blank');

        // Detect if popup was blocked
        if (!popup || popup.closed === undefined || popup.closed) {
          // Popup might be blocked – show fallback
          showFallback(redirectUrl);
        } else {
          hideAllOverlays();
        }
      } catch (err) {
        console.error(err);
        showError(`Unable to prepare your media: ${err.message}. Please try again.`);
      }
    }

    // ========== BATCH LOGIC ==========
    const loader = document.getElementById('loader');
    const app = document.getElementById('app');
    const batchTitleEl = document.getElementById('batch-title');
    const heroThumb = document.getElementById('hero-thumbnail');
    const heroTitleEl = document.getElementById('hero-title');
    const heroPrice = document.getElementById('hero-price');
    const descContainer = document.getElementById('description-container');
    const subjectList = document.getElementById('subject-list');
    const breadcrumb = document.getElementById('breadcrumb');
    const fileGrid = document.getElementById('file-grid');
    const tabBtns = document.querySelectorAll('.tab-btn');
    const overviewPanel = document.getElementById('overview-panel');
    const studyPanel = document.getElementById('study-material-panel');
    let currentBatchToken = null;
    let contentToken = null;
    let folderStack = [];

    tabBtns.forEach(btn => {
      btn.addEventListener('click', () => {
        tabBtns.forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        overviewPanel.classList.toggle('hidden', btn.dataset.tab !== 'overview');
        studyPanel.classList.toggle('hidden', btn.dataset.tab !== 'study-material');
      });
    });

    function finishLoading() {
      loader.style.display = 'none';
      app.classList.remove('hidden');
    }

    async function loadCourse(token) {
      try {
        const course = await fetchAndDecode(`${CONFIG.API_BASE}/course/${token}`);
        currentBatchToken = token;
        contentToken = course.content_token;

        const overviewSection = course.data?.data?.find(s => s.type === 'overview');
        if (overviewSection) {
          const detailsLayout = overviewSection.data?.find(l => l.layout_type === 'details');
          if (detailsLayout?.layout_data?.[0]) {
            const info = detailsLayout.layout_data[0];
            heroThumb.src = info.thumbnail || course.thumbnail || '';
            heroTitleEl.textContent = info.title || course.title || '';
            heroPrice.textContent = info.offer_price ? `₹${info.offer_price}` : (info.mrp ? `₹${info.mrp}` : '');
            batchTitleEl.textContent = info.title || course.title || 'Batch';
            descContainer.innerHTML = info.description || '<p class="text-zinc-400">No description available.</p>';
          }
        } else {
          heroThumb.src = course.thumbnail || '';
          heroTitleEl.textContent = course.title || '';
          heroPrice.textContent = '';
          batchTitleEl.textContent = course.title || 'Batch';
          descContainer.innerHTML = '<p class="text-zinc-400">No description available.</p>';
        }

        if (contentToken) {
          try { await loadContentTree(contentToken); }
          catch (e) { fileGrid.innerHTML = '<div class="text-center text-zinc-400 py-8">⚠️ Content not available.</div>'; }
        } else {
          fileGrid.innerHTML = '<div class="text-center text-zinc-400 py-8">No content token available.</div>';
          subjectList.innerHTML = '<li class="text-zinc-500 text-sm">No subjects</li>';
        }
      } catch (e) {
        batchTitleEl.textContent = 'Error loading batch';
        descContainer.innerHTML = `<p class="text-red-400">Failed to load batch: ${e.message}</p>`;
      } finally {
        finishLoading();
      }
    }

    async function loadContentTree(token) {
      const json = await fetchAndDecode(`${CONFIG.API_BASE}/content/${token}`);
      if (json.data) renderRootFolders(json.data);
    }

    function renderRootFolders(folders) {
      subjectList.innerHTML = '';
      fileGrid.innerHTML = '';
      if (!folders || !folders.length) {
        subjectList.innerHTML = '<li class="text-zinc-500 text-sm">No subjects</li>';
        return;
      }
      folders.forEach(folder => {
        if (folder.type !== 'folder') return;
        const li = document.createElement('li');
        li.className = 'cursor-pointer p-3 rounded-xl bg-white/5 hover:bg-indigo-500/20 transition font-medium';
        li.textContent = folder.title;
        li.addEventListener('click', () => selectSubject(folder.token, folder.title));
        subjectList.appendChild(li);
      });
    }

    function selectSubject(folderToken, folderTitle) {
      document.querySelectorAll('#subject-list li').forEach(li => {
        li.classList.toggle('bg-indigo-500/30', li.textContent === folderTitle);
        li.classList.toggle('text-white', li.textContent === folderTitle);
      });
      folderStack = [{ token: folderToken, title: folderTitle }];
      loadFolderContents(folderToken);
      tabBtns.forEach(b => b.classList.remove('active'));
      document.querySelector('[data-tab="study-material"]').classList.add('active');
      overviewPanel.classList.add('hidden');
      studyPanel.classList.remove('hidden');
    }

    async function loadFolderContents(folderToken) {
      fileGrid.innerHTML = '<div class="text-center text-zinc-400 py-8">Loading...</div>';
      try {
        const json = await fetchAndDecode(`${CONFIG.API_BASE}/content/${folderToken}`);
        renderItems(json.data, folderToken);
      } catch (e) {
        fileGrid.innerHTML = `<div class="text-center text-red-400 py-8">Failed to load: ${e.message}. <button onclick="loadFolderContents('${folderToken}')" class="underline text-indigo-400">Retry</button></div>`;
      }
    }

    function renderItems(items, parentToken) {
      fileGrid.innerHTML = '';
      if (!items || !items.length) {
        fileGrid.innerHTML = '<div class="text-center text-zinc-500 py-8">Nothing here</div>';
        return;
      }
      items.forEach(item => {
        if (item.type === 'folder') {
          const wrapper = document.createElement('div');
          wrapper.className = 'folder-header';
          wrapper.innerHTML = `<img src="images/folder.png" alt="folder" class="folder-icon" /><span class="folder-title">${item.title}</span><span class="expand-arrow">▶</span>`;
          const subContainer = document.createElement('div');
          subContainer.className = 'folder-content';
          wrapper.appendChild(subContainer);
          fileGrid.appendChild(wrapper);
          wrapper.addEventListener('click', async (e) => {
            e.stopPropagation();
            const arrow = wrapper.querySelector('.expand-arrow');
            if (subContainer.classList.contains('open')) {
              subContainer.classList.remove('open'); subContainer.innerHTML = ''; arrow.textContent = '▶'; return;
            }
            subContainer.classList.add('open'); arrow.textContent = '▼';
            subContainer.innerHTML = '<div class="text-center text-zinc-400 py-4">Loading...</div>';
            try {
              const json = await fetchAndDecode(`${CONFIG.API_BASE}/content/${item.token}`);
              const children = json.data || [];
              const files = children.filter(f => f.type === 'file');
              const subFolders = children.filter(f => f.type === 'folder');
              subContainer.innerHTML = '';
              subFolders.forEach(sub => {
                const subCard = document.createElement('div');
                subCard.className = 'folder-header';
                subCard.innerHTML = `<img src="images/folder.png" class="folder-icon" style="width:30px;height:30px;" /><span class="folder-title">${sub.title}</span>`;
                subCard.addEventListener('click', (e2) => { e2.stopPropagation(); folderStack.push({ token: sub.token, title: sub.title }); loadFolderContents(sub.token); });
                subContainer.appendChild(subCard);
              });
              files.forEach(file => {
                const fileCard = document.createElement('div');
                fileCard.className = 'file-card';
                const img = document.createElement('img');
                img.className = 'thumb'; img.src = file.thumbnail || ''; img.alt = '';
                img.onerror = () => { img.src = 'data:image/svg+xml,...'; };
                fileCard.appendChild(img);
                const info = document.createElement('div');
                info.className = 'info';
                info.innerHTML = `<div class="title">${file.title}</div><div class="meta">${file.file_type === 2 ? '🎬 Video' : '📄 PDF'}</div>`;
                fileCard.appendChild(info);
                fileCard.addEventListener('click', () => handleFileClick(file));
                subContainer.appendChild(fileCard);
              });
              if (!subFolders.length && !files.length) subContainer.innerHTML = '<div class="text-zinc-500 text-sm p-2">This folder is empty</div>';
              subContainer.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
            } catch (err) {
              subContainer.innerHTML = `<div class="text-red-400 text-sm p-2">Failed to load: ${err.message}. <button class="underline text-indigo-400" onclick="this.parentElement.innerHTML='Loading...'; loadSubFolderContent('${item.token}', this.parentElement)">Retry</button></div>`;
            }
          });
        } else if (item.type === 'file') {
          const card = document.createElement('div');
          card.className = 'file-card';
          const img = document.createElement('img');
          img.className = 'thumb'; img.src = item.thumbnail || ''; img.alt = '';
          img.onerror = () => { img.src = 'data:image/svg+xml,...'; };
          card.appendChild(img);
          const info = document.createElement('div');
          info.className = 'info';
          info.innerHTML = `<div class="title">${item.title}</div><div class="meta">${item.file_type === 2 ? '🎬 Video' : '📄 PDF'}</div>`;
          card.appendChild(info);
          card.addEventListener('click', () => handleFileClick(item));
          fileGrid.appendChild(card);
        }
      });
      updateBreadcrumb();
    }

    window.loadSubFolderContent = async function(token, container) {
      try {
        container.innerHTML = '<div class="text-center text-zinc-400 py-4">Loading...</div>';
        const json = await fetchAndDecode(`${CONFIG.API_BASE}/content/${token}`);
        const children = json.data || [];
        const files = children.filter(f => f.type === 'file');
        const subFolders = children.filter(f => f.type === 'folder');
        container.innerHTML = '';
        subFolders.forEach(sub => {
          const subCard = document.createElement('div');
          subCard.className = 'folder-header';
          subCard.innerHTML = `<img src="images/folder.png" class="folder-icon" style="width:30px;height:30px;" /><span class="folder-title">${sub.title}</span>`;
          subCard.addEventListener('click', (e2) => { e2.stopPropagation(); folderStack.push({ token: sub.token, title: sub.title }); loadFolderContents(sub.token); });
          container.appendChild(subCard);
        });
        files.forEach(file => {
          const fileCard = document.createElement('div');
          fileCard.className = 'file-card';
          const img = document.createElement('img');
          img.className = 'thumb'; img.src = file.thumbnail || ''; img.alt = '';
          img.onerror = () => { img.src = 'data:image/svg+xml,...'; };
          fileCard.appendChild(img);
          const info = document.createElement('div');
          info.className = 'info';
          info.innerHTML = `<div class="title">${file.title}</div><div class="meta">${file.file_type === 2 ? '🎬 Video' : '📄 PDF'}</div>`;
          fileCard.appendChild(info);
          fileCard.addEventListener('click', () => handleFileClick(file));
          container.appendChild(fileCard);
        });
      } catch (err) {
        container.innerHTML = `<div class="text-red-400 text-sm p-2">Failed to load: ${err.message}. <button class="underline text-indigo-400" onclick="loadSubFolderContent('${token}', this.parentElement)">Retry</button></div>`;
      }
    };

    async function handleFileClick(file) {
      showLoading();
      try {
        const fileUrl = await getMediaUrl(file.token);
        await playMedia(fileUrl);
      } catch (e) {
        console.error(e);
        showError(`Failed to get media: ${e.message}`);
      }
    }

    function updateBreadcrumb() {
      breadcrumb.innerHTML = '';
      folderStack.forEach((f, i) => {
        if (i < folderStack.length - 1) {
          const btn = document.createElement('button');
          btn.className = 'text-indigo-400 hover:text-indigo-300 transition';
          btn.textContent = f.title;
          btn.addEventListener('click', () => { folderStack = folderStack.slice(0, i + 1); loadFolderContents(folderStack[i].token); });
          breadcrumb.appendChild(btn);
          breadcrumb.appendChild(document.createTextNode(' / '));
        } else {
          const span = document.createElement('span');
          span.className = 'text-white font-semibold';
          span.textContent = f.title;
          breadcrumb.appendChild(span);
        }
      });
    }

    async function loadBatch() {
      const params = new URLSearchParams(window.location.search);
      const token = params.get('token');
      if (!token) {
        loader.innerHTML = '<p class="text-red-400">No batch token provided. <a href="index.html" class="underline">Go to list</a></p>';
        return;
      }
      loadCourse(token);
    }

    loadBatch();
  </script>
</body>
</html>
